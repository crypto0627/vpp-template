services:
  # Next.js Frontend Application
  frontend:
    build:
      context: .
      dockerfile: ./apps/frontend/Dockerfile
    container_name: vpp-frontend
    restart: unless-stopped
    # Single source of truth — the same file `pnpm dev` and the build use.
    # JWT_SECRET and ANTHROPIC_API_KEY come straight from here, so they can
    # never drift between dev and Docker again.
    env_file:
      - ./apps/frontend/.env
    environment:
      # Container-specific overrides (these take precedence over env_file).
      # Inside the container, reach host services via host.docker.internal.
      DATABASE_URL: postgresql://admin:password@host.docker.internal:5432/auth_db
      NEXT_PUBLIC_API_BASE_URL: http://host.docker.internal:3003/data
      NEXT_PUBLIC_SITE_URL: http://localhost:3001
      NODE_ENV: production
      # Served over plain HTTP on localhost — must NOT mark the auth cookie
      # Secure, or the browser drops it and auth fails. Set to true behind HTTPS.
      COOKIE_SECURE: "false"
      # Port the Next.js server listens on
      PORT: 3001
    ports:
      - "3001:3001"
    networks:
      - vpp-network
    # Allow connecting to host services (for macOS/Windows)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Start the application
    command: node apps/frontend/server.js

networks:
  vpp-network:
    driver: bridge
